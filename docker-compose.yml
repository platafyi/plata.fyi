version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: platafyi
      POSTGRES_PASSWORD: platafyi
      POSTGRES_DB: platafyi
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U platafyi -d platafyi"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
