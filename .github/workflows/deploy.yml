name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/platafyi/api
  FRONTEND_IMAGE: ghcr.io/platafyi/frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=https://api.plata.fyi
            NEXT_PUBLIC_TURNSTILE_SITE_KEY=0x4AAAAAAC0pIs0lhGbyX74g
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
            ${{ env.FRONTEND_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  backup:
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.32.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Export CSV
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          echo "TIMESTAMP=${TIMESTAMP}" >> $GITHUB_ENV
          chmod +x scripts/export_csv.sh
          ./scripts/export_csv.sh plata_fyi_${TIMESTAMP}.csv

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "data-${{ env.TIMESTAMP }}" \
            plata_fyi_${{ env.TIMESTAMP }}.csv \
            --title "Salary data export ${{ env.TIMESTAMP }}" \
            --notes "Anonymous salary data from plata.fyi — no names, no emails, no identifying information. Free to use." \
            --repo ${{ github.repository }}

  deploy:
    runs-on: ubuntu-latest
    needs: [build-and-push, backup]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3
        with:
          version: 'v1.32.0'

      - name: Set up kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > $HOME/.kube/config
          chmod 600 $HOME/.kube/config

      - name: Apply secrets
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/postgres/secret.yaml
          kubectl apply -f k8s/backend/secret.yaml

      - name: Inject runtime secrets
        run: |
          kubectl patch secret platafyi-secret -n platafyi \
            --patch "{\"stringData\": {\"TURNSTILE_SECRET\": \"${{ secrets.TURNSTILE_SECRET }}\", \"DB_URL\": \"${{ secrets.DB_URL }}\"}}"

      - name: Deploy
        run: |
          sed -i "s/newTag: PLACEHOLDER/newTag: ${{ github.sha }}/g" k8s/backend/kustomization.yaml
          sed -i "s/newTag: PLACEHOLDER/newTag: ${{ github.sha }}/g" k8s/frontend/kustomization.yaml
          kubectl apply -k k8s/

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/platafyi-backend -n platafyi --timeout=120s
          kubectl rollout status deployment/platafyi-frontend -n platafyi --timeout=120s

      - name: Deployment summary
        run: |
          echo "## Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "**Commit SHA:** ${{ github.sha }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          kubectl get all -n platafyi >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
