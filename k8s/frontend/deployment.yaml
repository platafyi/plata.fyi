apiVersion: apps/v1
kind: Deployment
metadata:
  name: platafyi-frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: platafyi-frontend
  template:
    metadata:
      labels:
        app: platafyi-frontend
    spec:
      imagePullSecrets:
        - name: ghcr-secret
      containers:
        - name: platafyi-frontend
          image: ghcr.io/platafyi/frontend
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
          env:
            - name: NEXT_PUBLIC_API_URL
              value: "https://api.plata.fyi"
            - name: INTERNAL_API_URL
              value: "http://platafyi-backend"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 10
          resources:
            requests:
              memory: 128Mi
              cpu: 100m
            limits:
              memory: 512Mi
              cpu: 500m
